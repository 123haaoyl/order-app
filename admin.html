<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商家管理后台</title>
    <script src="./theme.js?v=fuzhou-menu"></script>
    <link rel="stylesheet" href="./styles.css?v=fuzhou-menu" />
  </head>
  <body>
    <div class="app-shell admin-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">B 端管理</p>
          <h1>商家管理后台</h1>
        </div>
        <div class="admin-top-actions">
          <a class="ghost-link" href="./index.html">客户端</a>
          <button class="ghost-button theme-toggle" data-theme-toggle type="button" aria-label="切换深色样式">
            <span class="theme-toggle-icon" aria-hidden="true"></span>
            <span data-theme-label>深色</span>
          </button>
          <button class="ghost-button" id="sign-out" type="button" hidden>退出</button>
        </div>
      </header>

      <main class="admin-layout">
        <section class="admin-panel" id="login-panel">
          <div class="admin-panel-header">
            <h2>登录</h2>
            <p id="auth-message" class="feedback"></p>
          </div>
          <label class="admin-field">
            <span>邮箱</span>
            <input id="admin-email" type="email" autocomplete="email" />
          </label>
          <label class="admin-field">
            <span>密码</span>
            <input id="admin-password" type="password" autocomplete="current-password" />
          </label>
          <button class="primary-button" id="sign-in" type="button">进入后台</button>
        </section>

        <section class="admin-dashboard" id="dashboard" hidden>
          <nav class="admin-tabs" aria-label="后台模块">
            <button class="active" data-admin-tab="overview" type="button">老板看板</button>
            <button data-admin-tab="orders" type="button">订单管理</button>
            <button data-admin-tab="menu" type="button">菜品管理</button>
            <button data-admin-tab="tables" type="button">桌台管理</button>
            <button data-admin-tab="printing" type="button">打印配置</button>
          </nav>

          <section class="admin-tab-panel active" data-admin-panel="overview">
            <section class="admin-panel compact-panel">
              <div class="admin-toolbar">
                <div>
                  <p class="eyebrow">经营日期</p>
                  <h2>老板看板</h2>
                </div>
                <div class="admin-controls">
                  <input id="overview-date" type="date" aria-label="看板日期" />
                </div>
              </div>
            </section>
            <div class="stats-grid">
              <div class="stat-card">
                <span>订单数</span>
                <strong id="today-count">0</strong>
              </div>
              <div class="stat-card">
                <span>营业额</span>
                <strong id="today-total">¥0</strong>
              </div>
              <div class="stat-card">
                <span>待处理</span>
                <strong id="new-count">0</strong>
              </div>
            </div>
            <section class="admin-panel">
              <div class="admin-toolbar">
                <div>
                  <p class="eyebrow">热销菜品</p>
                  <h2>当日排行</h2>
                </div>
              </div>
              <div id="hot-dish-list" class="compact-list"></div>
            </section>
          </section>

          <section class="admin-tab-panel" data-admin-panel="orders">
            <section class="admin-panel">
              <div class="admin-toolbar">
                <div>
                  <p class="eyebrow">实时接单</p>
                  <h2>订单管理</h2>
                </div>
                <div class="admin-controls">
                  <input id="order-search" type="search" placeholder="桌号、订单号、菜品" />
                  <input id="order-date" type="date" />
                  <select id="status-filter" aria-label="订单状态筛选">
                    <option value="all">全部</option>
                    <option value="new">待接单</option>
                    <option value="preparing">后厨备餐</option>
                    <option value="served">出餐</option>
                    <option value="done">完成</option>
                    <option value="canceled">已取消</option>
                  </select>
                  <button class="ghost-button" id="export-orders" type="button">导出</button>
                  <button class="ghost-button" id="refresh-orders" type="button">刷新</button>
                </div>
              </div>
              <div id="orders-list" class="orders-list"></div>
            </section>
          </section>

          <section class="admin-tab-panel" data-admin-panel="menu">
            <section class="admin-panel">
              <div class="admin-toolbar">
                <div>
                  <p class="eyebrow">核心</p>
                  <h2>菜品管理</h2>
                </div>
                <div class="admin-controls">
                  <button class="ghost-button" id="open-dish-form" type="button">新增菜品</button>
                </div>
              </div>
              <section class="category-admin-panel">
                <div class="section-title-row">
                  <div>
                    <p class="eyebrow">分类</p>
                    <h3>分类管理</h3>
                  </div>
                  <div class="category-add-controls">
                    <input id="new-category-name" type="text" placeholder="新分类名称" />
                    <button class="ghost-button" id="add-category" type="button">新增分类</button>
                  </div>
                </div>
                <div id="category-admin-list" class="category-admin-list"></div>
              </section>
              <div id="menu-admin-list" class="admin-table"></div>
            </section>
          </section>

          <section class="admin-tab-panel" data-admin-panel="tables">
            <section class="admin-panel">
              <div class="admin-toolbar">
                <div>
                  <p class="eyebrow">堂食</p>
                  <h2>桌台管理</h2>
                </div>
              </div>
              <div id="table-admin-list" class="table-grid"></div>
            </section>
          </section>

          <section class="admin-tab-panel" data-admin-panel="printing">
            <section class="admin-panel">
              <div class="admin-toolbar">
                <div>
                  <p class="eyebrow">后厨</p>
                  <h2>打印配置</h2>
                </div>
              </div>
              <div class="settings-grid">
                <div class="setting-card">
                  <span>热菜打印机</span>
                  <strong>Kitchen-Hot-01</strong>
                  <p>热菜、主食自动分单</p>
                </div>
                <div class="setting-card">
                  <span>凉菜打印机</span>
                  <strong>Kitchen-Cold-01</strong>
                  <p>凉菜、饮品自动分单</p>
                </div>
                <div class="setting-card">
                  <span>打印状态</span>
                  <strong>待接入</strong>
                  <p>需要后续绑定实体小票打印机服务</p>
                </div>
              </div>
            </section>
          </section>
        </section>
      </main>
    </div>

    <dialog id="dish-form-dialog" class="order-dialog wide-dialog">
      <div class="dialog-header">
        <div>
          <p class="eyebrow">菜品资料</p>
          <h2>新增菜品</h2>
        </div>
        <button id="close-dish-form" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>

      <div class="dish-form-grid">
        <label class="admin-field">
          <span>菜品名称</span>
          <input id="new-dish-name" type="text" placeholder="例如：番茄牛腩饭" />
        </label>
        <label class="admin-field">
          <span>分类</span>
          <select id="new-dish-category"></select>
        </label>
        <label class="admin-field" id="new-dish-custom-category-wrap" hidden>
          <span>新分类名称</span>
          <input id="new-dish-custom-category" type="text" placeholder="例如：套餐" />
        </label>
        <label class="admin-field">
          <span>价格</span>
          <input id="new-dish-price" type="number" min="0" step="1" value="28" />
        </label>
        <label class="admin-field">
          <span>库存</span>
          <input id="new-dish-stock" type="number" min="0" step="1" value="50" />
        </label>
        <label class="admin-field">
          <span>标签</span>
          <input id="new-dish-tag" type="text" placeholder="热卖、招牌、微辣" />
        </label>
        <label class="admin-field span-2">
          <span>描述</span>
          <input id="new-dish-description" type="text" placeholder="一句话介绍菜品口味和食材" />
        </label>
      </div>

      <section class="form-section">
        <div class="section-title-row">
          <div>
            <p class="eyebrow">缩略图</p>
            <h3>选择 icon</h3>
          </div>
          <input id="new-dish-icon-custom" class="small-input" type="text" maxlength="4" placeholder="自定义" />
        </div>
        <div id="dish-icon-options" class="icon-grid"></div>
      </section>

      <section class="form-section">
        <div class="section-title-row">
          <div>
            <p class="eyebrow">规格</p>
            <h3>份量、辣度等可自行编辑</h3>
          </div>
          <button class="ghost-button" id="add-spec-group" type="button">添加规格组</button>
        </div>
        <div id="spec-builder" class="spec-builder"></div>
      </section>

      <button id="save-new-dish" class="primary-button" type="button">保存菜品</button>
    </dialog>

    <div class="app-toast" id="app-toast" role="status" aria-live="polite" hidden></div>

    <script src="./data.js?v=fuzhou-menu"></script>
    <script src="./admin.js?v=cloud-api"></script>
  </body>
</html>
